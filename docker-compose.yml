version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

  scheduler:
    build: .
    env_file: .env
    command: python -m scheduler.runner
    volumes:
      - .:/app
    depends_on:
      - api
